<script>
// =======================
// Reveal animations
// =======================
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach((el) => {
  revealObserver.observe(el);
});


// =======================
// Publications filter
// =======================
const filterButtons = document.querySelectorAll('.filter-btn');
const publications = document.querySelectorAll('.pub-item');

filterButtons.forEach((btn) => {
  btn.addEventListener('click', () => {
    // Toggle active button
    filterButtons.forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');

    const filter = btn.dataset.filter;

    // Show/hide publications
    publications.forEach((item) => {
      if (filter === 'all' || item.dataset.cat === filter) {
        item.style.display = 'block';
      } else {
        item.style.display = 'none';
      }
    });
  });
});


// =======================
// Skill bar animations
// =======================
const stackSection = document.querySelector('#stack');

if (stackSection) {
  const skillObserver = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        const bars = entry.target.querySelectorAll('.sbar-fill');

        bars.forEach((bar) => {
          const width = bar.dataset.w || 1;
          bar.style.transform = `scaleX(${width})`;
        });

        skillObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.3 });

  skillObserver.observe(stackSection);
}


// =======================
// Navbar active link highlighting
// =======================
const sections = document.querySelectorAll('section[id]');
const navLinks = document.querySelectorAll('.nav-link[href^="#"]');

const navObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (entry.isIntersecting) {
      const id = entry.target.id;

      navLinks.forEach((link) => {
        if (link.getAttribute('href') === `#${id}`) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    }
  });
}, { threshold: 0.5 });

sections.forEach((section) => {
  navObserver.observe(section);
});

</script>
</html>
